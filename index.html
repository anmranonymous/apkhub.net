<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APK Hub Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet"><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
  background: linear-gradient(135deg,#020617,#0f172a);
  color:white;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
  background:#020617;
  position:sticky;
  top:0;
}

.logo{font-size:22px;font-weight:700}

nav a{
  margin:0 10px;
  text-decoration:none;
  color:white;
  font-size:14px;
}

.hero{
  text-align:center;
  padding:50px 20px;
}

.hero h1{font-size:32px;margin-bottom:10px}
.hero p{opacity:0.7}

.search{
  display:flex;
  justify-content:center;
  margin-top:20px;
}

.search input{
  padding:12px;
  width:300px;
  border-radius:30px;
  border:none;
  outline:none;
}

.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:20px;
  text-align:center;
  transition:0.4s;
  position:relative;
  overflow:hidden;
}

.card::before{
  content:'';
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:-100%;
  background:linear-gradient(120deg,transparent,#06b6d4,transparent);
  transition:0.5s;
}

.card:hover::before{left:100%}

.card:hover{
  transform:translateY(-10px) scale(1.05);
  box-shadow:0 15px 40px rgba(0,255,255,0.3);
}

.card img{
  width:80px;
  margin-bottom:10px;
}

.card h2{font-size:16px;margin:10px 0}

.btn{
  display:inline-block;
  padding:10px 15px;
  border-radius:30px;
  background:#06b6d4;
  color:black;
  text-decoration:none;
  margin-top:10px;
  transition:0.3s;
}

.btn:hover{background:#22d3ee}

.footer{
  text-align:center;
  padding:30px;
  background:#020617;
  margin-top:40px;
  font-size:14px;
  opacity:0.7;
}

.fade{
  animation:fadeIn 1s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(30px)}
  to{opacity:1;transform:translateY(0)}
}

</style></head><body><header>
<div class="logo">APK Hub Pro 🚀</div>
<nav>
<a href="#">Home</a>
<a href="#">Apps</a>
<a href="#">About</a>
</nav>
</header><section class="hero">
<h1>Download Premium APKs</h1>
<p>Fast • Safe • Direct Download</p><div class="search">
<input type="text" id="search" placeholder="Search apps...">
</div>
</section><div class="container" id="appList"><div class="card fade">
<img src="images/capcut.png">
<h2>CapCut</h2>
<a class="btn" href="page/capcut.html">View</a>
</div><div class="card fade">
<img src="images/inshot.png">
<h2>InShot</h2>
<a class="btn" href="inshot.html">View</a>
</div><div class="card fade">
<img src="images/picsart.png">
<h2>PicsArt</h2>
<a class="btn" href="picsart.html">View</a>
</div><div class="card fade">
<img src="images/remini.png">
<h2>Remini</h2>
<a class="btn" href="remini.html">View</a>
</div></div><div class="footer">© 2026 APK Hub Pro | All Rights Reserved</div><script>
const search=document.getElementById('search');
search.addEventListener('keyup',()=>{
let filter=search.value.toLowerCase();
let cards=document.querySelectorAll('.card');
cards.forEach(card=>{
let text=card.innerText.toLowerCase();
card.style.display=text.includes(filter)?'block':'none';
});
});
</script></body>
</html>
