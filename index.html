<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APK Hub Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
  <div class="logo">APK Hub Pro 🚀</div>
  <nav>
    <a href="#">Home</a>
    <a href="#">Apps</a>
    <a href="#">About</a>
  </nav>
</header>

<section class="hero">
  <h1>Download Premium APKs</h1>
  <p>Fast • Safe • Direct Download</p>

  <div class="search">
    <input type="text" id="search" placeholder="Search apps...">
  </div>
</section>

<div class="container" id="appList">

  <div class="card fade">
    <img src="images/capcut.png">
    <h2>CAPCUT PRO 📥</h2>
    <a class="btn" href="page/capcut.html">View</a>
  </div>

  <div class="card fade">
    <img src="images/inshot.png">
    <h2>INSHOT PRO 📥</h2>
    <a class="btn" href="page/inshot.html">View</a>
  </div>

  <div class="card fade">
    <img src="images/picsart.png">
    <h2>PICSART PRO 📥</h2>
    <a class="btn" href="page/picsart.html">View</a>
  </div>

  <div class="card fade">
    <img src="images/remini.png">
    <h2>REMINI PRO 📥</h2>
    <a class="btn" href="page/remini.html">View</a>
  </div>

</div>

<div class="footer">© 2026 APK Hub Pro</div>

<script>
const search=document.getElementById('search');
search.addEventListener('keyup',()=>{
let filter=search.value.toLowerCase();
let cards=document.querySelectorAll('.card');
cards.forEach(card=>{
let text=card.innerText.toLowerCase();
card.style.display=text.includes(filter)?'block':'none';
});
});
</script>

</body>
</html>
