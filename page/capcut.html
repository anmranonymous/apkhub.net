<!DOCTYPE html>
<html>
<head>
  <title>CapCut</title>
  <link rel="stylesheet" href="../style.css">
</head>

<body>

<div class="container">
  <div class="card">

    <img src="../images/capcut.png">

    <h1>CapCut</h1>

    <p><b>Version:</b> 10.0</p>
    <p><b>Size:</b> 120MB</p>

    <h3>Features:</h3>
    <ul>
      <li>No watermark</li>
      <li>Premium unlocked</li>
      <li>HD export</li>
    </ul>

    <!-- BUTTON -->
    <a id="downloadBtn" class="btn" href="#">Download Now</a>

  </div>
</div>

<script>
const btn = document.getElementById("downloadBtn");

btn.addEventListener("click", function(e){
  e.preventDefault();

  btn.innerText = "Preparing...";
  btn.classList.add("loading");

  setTimeout(()=>{
    window.open("YOUR_MEDIAFIRE_LINK", "_blank");
    btn.innerText = "Download Now";
    btn.classList.remove("loading");
  }, 2000);
});
</script>

</body>
</html>
