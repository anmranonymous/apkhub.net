<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CapCut</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
  background: linear-gradient(135deg,#020617,#0f172a);
  color:white;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
  background:#020617;
}

.logo{font-size:22px;font-weight:700}

.container{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:80vh;
}

.card{
  background:#1e293b;
  padding:30px;
  border-radius:20px;
  text-align:center;
  width:320px;
  transition:0.4s;
}

.card:hover{
  transform:scale(1.05);
  box-shadow:0 15px 40px rgba(0,255,255,0.3);
}

.card img{
  width:100px;
  margin-bottom:10px;
}

.btn{
  display:inline-block;
  padding:12px 20px;
  border-radius:30px;
  background:#06b6d4;
  color:black;
  text-decoration:none;
  margin-top:15px;
}
</style>

</head>

<body>

<header>
  <div class="logo">APK Hub Pro 🚀</div>
</header>

<div class="container">
  <div class="card">

    <img src="../images/capcut.png">

    <h1>CapCut</h1>

    <p><b>Version:</b> 10.0</p>
    <p><b>Size:</b> 120MB</p>

    <h3>Features:</h3>
    <ul>
      <li>No watermark</li>
      <li>Premium unlocked</li>
      <li>HD export</li>
    </ul>

    <a id="downloadBtn" class="btn" href="#">Download Now</a>

  </div>
</div>

<script>
const btn = document.getElementById("downloadBtn");

btn.addEventListener("click", function(e){
  e.preventDefault();

  btn.innerText = "Preparing...";
  btn.style.background = "gray";

  setTimeout(()=>{
    window.open("YOUR_MEDIAFIRE_LINK", "_blank");
    btn.innerText = "Download Now";
    btn.style.background = "#06b6d4";
  }, 2000);
});
</script>

</body>
</html>
